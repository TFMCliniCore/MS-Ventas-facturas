services:
  ms-ventas-db:
    image: postgres:16-alpine
    container_name: clinicore-ventas-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ms_ventas_postgres_data:/var/lib/postgresql/data

  api-ventas:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clinicore-ms-ventas
    restart: unless-stopped
    depends_on:
      ms-ventas-db:
        condition: service_healthy
    environment:
      PORT: ${PORT}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@ms-ventas-db:5432/${POSTGRES_DB}?schema=public
      MS_INVENTARIO_URL: ${MS_INVENTARIO_URL}
      MS_ENTIDADES_CORE_URL: ${MS_ENTIDADES_CORE_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${PORT}:${PORT}"

volumes:
  ms_ventas_postgres_data: